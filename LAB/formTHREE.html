<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
</head>

<body>

    <h1>Create your account</h1>
    <p>Join us in a couple of steps.</p>

    <form action="#" method="post">

        <fieldset>

            <table>

                <tr>
                    <td>
                        <label for="fullname">Full Name</label>
                    </td>
                </tr>

                <tr>
                    <td >
                        <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="age">Age</label>
                    </td>
                </tr>

                <tr>
                    <td >
                        <input type="number" id="age" name="age" placeholder="28">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="dob">Date of Birth</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="date" id="dob" name="dob">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="email">Email Address</label>
                    </td>
                </tr>

                <tr>
                    <td >
                        <input type="email" id="email" name="email" placeholder="jane@example.com">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="password">Password</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="password" id="password" name="password" placeholder="********">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label>Preferred Contact</label>
                    </td>
                </tr>

                <tr>
                    <td >
                        <input type="radio" id="emailcontact" name="contact" value="Email" checked>
                        <label for="emailcontact">Email</label>

                        <input type="radio" id="phonecontact" name="contact" value="Phone">
                        <label for="phonecontact">Phone</label>

                        <input type="radio" id="smscontact" name="contact" value="SMS">
                        <label for="smscontact">SMS</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="submit" value="Submit">
                    </td>

                    <td>
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>

        </fieldset>

    </form>

</body>

</html>
