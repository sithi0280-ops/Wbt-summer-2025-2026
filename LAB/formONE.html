<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Workspace</title>
</head>

<body>
    <p>GET STARTED</p>
    <h1>Create Your Workspace</h1>

    <form action="#" method="post">

        <fieldset>
           

            <table>

               <tr>
    <td>
        <label for="fullname">Full name</label>
    </td>
</tr>

<tr>
    <td>
        <input type="text" id="fullname" name="fullname" placeholder="jone De">
    </td>
</tr>
    <td>
        <label for="phone">Phone Number</label>
    </td>
</tr>

<tr>
    <td>
        <input type="tel" id="phone" name="phone" placeholder="5551234567">
    </td>
</tr>

               <tr>
    <td>
        <label for="dob">Date Of Birth</label>
    </td>
</tr>

<tr>
    <td>
        <input type="date" id="dob" name="dob" >
    </td>
</tr>

             

                <tr>
    <td>
        <label for="email">Work email</label>
    </td>
</tr>

<tr>
    <td >
        <input type="email" id="email" name="email" placeholder="jone@company.com">
    </td>
</tr>
<tr>
    <td>
        <label for="password">Password</label>
    </td>
</tr>

<tr>
    <td>
        <input type="password"
               id="password"
               name="password"
               placeholder="At least 8 characters">
    </td>
</tr>

                <tr>
                    <td>
                        <input type="checkbox" id="updates" name="updates" checked>
                        <label for="updates">
                            Email me product updates and tips
                        </label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            I agree to the Terms Privacy Policy
                        </label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="submit" value="Create Workspace">
                    </td>
                    <td>
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>

        </fieldset>

    </form>

</body>

</html>
