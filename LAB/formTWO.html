<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>

<body>

    <h1>Registration</h1>
    <p>Please complete all fields below.</p>

    <form action="#" method="post">

        <fieldset>

            <table>

                <tr>
                    <td>
                        <label for="fullname">Full Name</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="text" id="fullname" name="fullname" placeholder="Jane Doe">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="postal">Postal Code</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="number" id="postal" name="postal" placeholder="10001">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="dob">Date of Birth</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="date" id="dob" name="dob">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="email">Email Address</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="email" id="email" name="email" placeholder="jane@example.com">
                    </td>
                </tr>

                <tr>
                    <td>
                        <label for="password">Password</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="password" id="password" name="password" placeholder="********">
                    </td>
                </tr>

                <tr>
                    <td >
                        <label for="country">Country</label>
                    </td>
                </tr>

                <tr>
                    <td>
                        <select id="country" name="country">
                            <option>Select a country...</option>
                            <option>Bangladesh</option>
                            <option>India</option>
                            <option>Pakistan</option>
                            <option>Nepal</option>
                            <option>USA</option>
                            <option>Canada</option>
                            <option>Australia</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td>
                        <input type="submit" value="Submit">
                    </td>

                    <td>
                        <input type="reset" value="Reset">
                    </td>
                </tr>

            </table>

        </fieldset>

    </form>

</body>

</html>
